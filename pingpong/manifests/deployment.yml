apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: pingpong
  name: pingpong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pingpong
  strategy: {}
  template:
    metadata:
      labels:
        app: pingpong
    spec:
      volumes:
        - name: log-output-pingpong-share
          persistentVolumeClaim:
            claimName: share-claim
      containers:
      - image: pingpong:1.11
        imagePullPolicy: IfNotPresent
        name: log-output-q5gb9
        volumeMounts:
          - name: log-output-pingpong-share
            mountPath: /tmp
        resources: {}
status: {}
